name: test-all

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: debian:12
    steps:
      - uses: actions/checkout@v4
      - run: git submodule update --init canvas-ui
      - run: apt-get update && apt-get install -y ca-certificates libssl3
      - run: tests/test-all
